<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baseball VR Simulator</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
    #info {
      position: fixed; top: 10px; left: 10px; color: white;
      background: rgba(0,0,0,0.6); padding: 10px 14px; border-radius: 6px;
      font-size: 13px; line-height: 1.5; max-width: 340px; z-index: 10;
    }
    #info code { background: rgba(255,255,255,0.15); padding: 1px 5px; border-radius: 3px; }
    #info kbd { background: #444; color: #fff; padding: 1px 6px; border-radius: 3px;
                border: 1px solid #888; font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>
  <div id="info">
    <b>⚾ Baseball VR</b><br/>
    🏏 Move controller to the <span style="color:#0f0">green pedestal</span>,
    press <b>GRIP (squeeze)</b> to grab<br/>
    🎯 Pull <b>trigger</b> to pitch a ball<br/>
    ⌨️ Desktop: <kbd>G</kbd> grab/drop · <kbd>P</kbd> pitch · <kbd>D</kbd> toggle debug<br/>
    🖱️ Drag to look · Scroll to zoom
  </div>

  <!-- Debug toggle button -->
  <button id="debugBtn" style="
    position:fixed; bottom:70px; right:10px; z-index:10;
    background:#222; color:#0f0; border:2px solid #0f0;
    padding:10px 18px; border-radius:6px; cursor:pointer;
    font-family:sans-serif; font-size:14px; font-weight:bold;">
    🐞 Debug: ON
  </button>

  <!-- Also put a big HUD with camera position in the corner -->
  <div id="coords" style="position:fixed;top:10px;right:10px;color:#0f0;
       background:rgba(0,0,0,0.6);padding:8px 12px;border-radius:4px;
       font:12px monospace;z-index:10;">cam: ...</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';
  import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
  import { VRButton }      from 'three/addons/webxr/VRButton.js';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import * as CANNON       from 'cannon-es';

  // ============================================================
  // 🎯 CONFIG — TWEAK EVERYTHING HERE
  // ============================================================
  const CONFIG = {

    // === 📁 ASSET PATHS ===
    assets: {
      stadium: './assets/stadium.glb',
      bat:     './assets/bat.glb',
      ball:    './assets/baseball.glb',
    },

    // === 🏟️ STADIUM ===
    // ⚠️ If you had to move your player to huge coordinates (e.g. -750, 20),
    // your stadium is modeled at the wrong scale. Try stadium.scale = 0.01
    // or 0.1 so 1 Three.js unit = 1 meter. Leaves physics & ball size correct.
    stadium: {
      position: { x: 0, y: 0, z: 0 },
      rotation: { x: 0, y: 0, z: 0 },
      scale:    1.0,
    },

    // === 🧍 PLAYER ===
    player: {
      position: { x: 0, y: 0, z: 0 },  // START AT ORIGIN to find everything
      rotation: { x: 0, y: 0, z: 0 },
    },

    // === 🏏 BAT ===
    bat: {
      // If true, use a built-in red cylinder as the bat (guaranteed visible).
      // Set to false once you've confirmed everything works, to use your .glb.
      useFallbackBat: true,
      scale: 1.0,
      // Where the bat spawns in the world, relative to the player.
      pickupSpawnOffset: { x: 0.5, y: 1.0, z: -0.7 },
      pickupRange: 1.0, // meters — generous so pickup is easy
      // Offset once the bat is held (relative to the grip).
      offset: {
        position: { x: 0, y: 0, z: -0.45 }, // push bat forward ~half its length
        rotation: { x: -Math.PI / 2, y: 0, z: 0 }, // rotate so it points forward
      },
      forceRedWhenHeld: true,
      hitbox: {
        radius: 0.15,   // per-sphere radius in the chain
        length: 0.85,   // bat length — spheres span this
      },
    },

    // === ⚾ BASEBALL ===
    ball: {
      scale:  0.4,      // softball-sized while debugging, still visible
      radius: 0.12,     // generous hitbox
      mass:   0.145,
    },

    // === 🎯 PITCH ===
    pitch: {
      spawnOffset:  { x: 0, y: 2.0, z: -12 },     // mound 2m high (pitcher's arm)
      targetOffset: { x: 0, y: 1.3, z: -0.5 },    // chest-height strike zone
      speed: 12,                                   // comfortable swinging speed
      randomSpread: 0.15,
      cooldownMs: 500,
    },

    // === 🧲 PHYSICS ===
    physics: {
      gravity: -9.82,
      hitBoost: 1.5,
    },

    // === 📊 HUD ===
    hud: {
      enabled: true,
      position: { x: 0, y: 2.4, z: -2 },
      size: { w: 1.0, h: 0.5 },
    },

    // === 🐞 DEBUG / PREVIEW ===
    debug: {
      previewBat: true,
      previewBatPos: { x: 0.3, y: 1.2, z: -0.6 },
      showMarkers: true,
      keyboardPitch: true,
      showBatLocationCube: true,
      batCubeSize: 1.0,
      // 🟦 Show a translucent blue cylinder where the bat's physics collider is.
      // If this isn't overlapping with your red bat, that's your problem.
      showBatCollider: true,
    },
  };
  // ============================================================
  // END CONFIG
  // ============================================================


  // ---------- Scene / Renderer ----------
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);

  const camera   = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 5000);
  camera.position.set(3, 3, 5); // pulled back so you can see origin on load

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  renderer.xr.enabled = true;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.body.appendChild(renderer.domElement);
  document.body.appendChild(VRButton.createButton(renderer));

  scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.0));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
  dirLight.position.set(5, 10, 5);
  scene.add(dirLight);

  // ---------- Debug Registry (declared early so everything can push to it) ----------
  const debugObjects = [];
  let debugVisible = true;
  const coordsEl = document.getElementById('coords');

  function setDebugVisible(on) {
    debugVisible = on;
    for (const obj of debugObjects) obj.visible = on;
    if (coordsEl) coordsEl.style.display = on ? 'block' : 'none';
    const btn = document.getElementById('debugBtn');
    if (btn) {
      btn.textContent = on ? '🐞 Debug: ON' : '🐞 Debug: OFF';
      btn.style.color = on ? '#0f0' : '#f88';
      btn.style.borderColor = on ? '#0f0' : '#f88';
    }
    console.log(`🐞 Debug mode: ${on ? 'ON' : 'OFF'}`);
  }

  // 🧭 Axis helper at origin — red=X, green=Y, blue=Z
  const axisHelperObj = new THREE.AxesHelper(10);
  axisHelperObj.material.depthTest = false;
  axisHelperObj.renderOrder = 999;
  scene.add(axisHelperObj);
  debugObjects.push(axisHelperObj);

  // 🖱️ Desktop mouse-look controls (disabled once you enter VR)
  const orbit = new OrbitControls(camera, renderer.domElement);
  orbit.target.set(0, 1.5, -1);
  orbit.update();
  renderer.xr.addEventListener('sessionstart', () => { orbit.enabled = false; });
  renderer.xr.addEventListener('sessionend',   () => { orbit.enabled = true;  });

  // Player rig
  const playerRig = new THREE.Group();
  playerRig.position.set(CONFIG.player.position.x, CONFIG.player.position.y, CONFIG.player.position.z);
  playerRig.rotation.set(CONFIG.player.rotation.x, CONFIG.player.rotation.y, CONFIG.player.rotation.z);
  playerRig.add(camera);
  scene.add(playerRig);


  // ---------- Physics ----------
  const world = new CANNON.World({ gravity: new CANNON.Vec3(0, CONFIG.physics.gravity, 0) });
  world.broadphase = new CANNON.SAPBroadphase(world);
  world.allowSleep = true;

  const ballMat   = new CANNON.Material('ball');
  const batMat    = new CANNON.Material('bat');
  const groundMat = new CANNON.Material('ground');
  world.addContactMaterial(new CANNON.ContactMaterial(ballMat, batMat,    { friction: 0.1, restitution: 0.9 }));
  world.addContactMaterial(new CANNON.ContactMaterial(ballMat, groundMat, { friction: 0.4, restitution: 0.4 }));

  const groundBody = new CANNON.Body({ mass: 0, material: groundMat, shape: new CANNON.Plane() });
  groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
  groundBody.position.y = CONFIG.player.position.y; // ground at player's feet
  world.addBody(groundBody);


  // ---------- Asset Loading ----------
  const loader = new GLTFLoader();
  const loadGLB = url => new Promise((res, rej) => loader.load(url, g => res(g.scene), undefined, rej));

  let stadiumModel, batTemplate, ballTemplate;

  async function loadAll() {
    console.log('Loading .glb assets…');
    [stadiumModel, batTemplate, ballTemplate] = await Promise.all([
      loadGLB(CONFIG.assets.stadium),
      loadGLB(CONFIG.assets.bat),
      loadGLB(CONFIG.assets.ball),
    ]);

    stadiumModel.position.set(CONFIG.stadium.position.x, CONFIG.stadium.position.y, CONFIG.stadium.position.z);
    stadiumModel.rotation.set(CONFIG.stadium.rotation.x, CONFIG.stadium.rotation.y, CONFIG.stadium.rotation.z);
    stadiumModel.scale.setScalar(CONFIG.stadium.scale);
    scene.add(stadiumModel);
    console.log('✓ Stadium loaded');

    // Size sanity checks
    const sBox = new THREE.Box3().setFromObject(stadiumModel);
    const sSize = sBox.getSize(new THREE.Vector3());
    console.log(`📏 Stadium size: ${sSize.x.toFixed(2)} × ${sSize.y.toFixed(2)} × ${sSize.z.toFixed(2)} units`);

    const bBox = new THREE.Box3().setFromObject(batTemplate);
    const bSize = bBox.getSize(new THREE.Vector3());
    console.log(`📏 Bat raw size: ${bSize.x.toFixed(3)} × ${bSize.y.toFixed(3)} × ${bSize.z.toFixed(3)} units`);

    const ballBox = new THREE.Box3().setFromObject(ballTemplate);
    const ballSize = ballBox.getSize(new THREE.Vector3());
    console.log(`📏 Ball raw size: ${ballSize.x.toFixed(3)} × ${ballSize.y.toFixed(3)} × ${ballSize.z.toFixed(3)} units`);

    // If stadium is huge AND bat is tiny, bat will be invisible
    if (sSize.x > 300 && bSize.x < 2) {
      console.warn('⚠️ SCALE MISMATCH: Stadium is in cm-scale but bat is in m-scale.');
      console.warn('   Fix 1 (recommended): stadium.scale = 0.01, player back to (0,0,0)');
      console.warn('   Fix 2: bat.scale = 100, ball.scale = 100, ball.radius = 3.7');
    }
  }


  // ---------- Controllers + Bat ----------
  const grip0 = renderer.xr.getControllerGrip(0);
  const grip1 = renderer.xr.getControllerGrip(1);
  const ctrl0 = renderer.xr.getController(0);
  const ctrl1 = renderer.xr.getController(1);
  playerRig.add(grip0, grip1, ctrl0, ctrl1);

  // 🟣 Visible controller markers
  function makeControllerMarker(color) {
    const g = new THREE.Group();
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(0.05, 16, 16),
      new THREE.MeshBasicMaterial({ color })
    );
    g.add(sphere);
    const arrow = new THREE.Mesh(
      new THREE.ConeGeometry(0.02, 0.15, 8),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    arrow.rotation.x = -Math.PI / 2;
    arrow.position.z = -0.1;
    g.add(arrow);
    return g;
  }
  const ctrlMarker0 = makeControllerMarker(0xff00ff);
  const ctrlMarker1 = makeControllerMarker(0x00ffff);
  grip0.add(ctrlMarker0);
  grip1.add(ctrlMarker1);
  debugObjects.push(ctrlMarker0, ctrlMarker1);

  ctrl0.addEventListener('connected', (e) => console.log('🎮 Controller 0 connected:', e.data.handedness));
  ctrl1.addEventListener('connected', (e) => console.log('🎮 Controller 1 connected:', e.data.handedness));

  // === BAT STATE ===
  let batMesh = null;       // the bat (lives in world OR on controller)
  let batBody = null;       // physics body for the bat
  let batHolder = null;     // which grip is holding it (null = on ground)
  const batPrevPos  = new THREE.Vector3();
  const batVelocity = new THREE.Vector3();

  function spawnBatInWorld() {
    // Build the bat mesh — either from .glb or a fallback red cylinder
    if (CONFIG.bat.useFallbackBat) {
      // Guaranteed-visible fallback bat: a simple red cylinder, 0.85m long
      const batGroup = new THREE.Group();
      const barrel = new THREE.Mesh(
        new THREE.CylinderGeometry(0.04, 0.03, 0.85, 16),
        new THREE.MeshStandardMaterial({ color: 0xff2222, emissive: 0x550000 })
      );
      // Add a darker grip area at one end so you can tell orientation
      const grip = new THREE.Mesh(
        new THREE.CylinderGeometry(0.028, 0.028, 0.2, 16),
        new THREE.MeshStandardMaterial({ color: 0x222222 })
      );
      grip.position.y = -0.325;
      batGroup.add(barrel, grip);
      batMesh = batGroup;
      console.log('🏏 Using FALLBACK cylinder bat (guaranteed visible)');
    } else {
      batMesh = batTemplate.clone(true);
      batMesh.scale.setScalar(CONFIG.bat.scale);
    }

    // Spawn position RELATIVE to player (so it's always reachable)
    const spawnPos = playerRig.localToWorld(new THREE.Vector3(
      CONFIG.bat.pickupSpawnOffset.x,
      CONFIG.bat.pickupSpawnOffset.y,
      CONFIG.bat.pickupSpawnOffset.z
    ));
    batMesh.position.copy(spawnPos);
    batMesh.rotation.set(0, 0, 0);
    scene.add(batMesh);

    // 🟦 Blue wireframe CYLINDER showing where the hitbox is.
    // Sphere chain along this cylinder — 10 overlapping spheres.
    const hitboxViz = new THREE.Mesh(
      new THREE.CylinderGeometry(
        CONFIG.bat.hitbox.radius,
        CONFIG.bat.hitbox.radius,
        CONFIG.bat.hitbox.length,
        16
      ),
      new THREE.MeshBasicMaterial({
        color: 0x00aaff,
        transparent: true,
        opacity: 0.25,
        wireframe: true,
        depthWrite: false,
      })
    );
    hitboxViz.name = 'batHitboxViz';
    batMesh.add(hitboxViz);
    debugObjects.push(hitboxViz);
    console.log(`🟦 Blue hitbox CYLINDER (r=${CONFIG.bat.hitbox.radius}m, L=${CONFIG.bat.hitbox.length}m)`);

    // Glowing green pedestal so you can SEE where the bat spawns
    const pedestal = new THREE.Mesh(
      new THREE.CylinderGeometry(0.3, 0.3, 0.05, 16),
      new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.6 })
    );
    pedestal.position.copy(spawnPos);
    pedestal.position.y -= 0.425;
    scene.add(pedestal);
    debugObjects.push(pedestal);

    // Physics body: a CHAIN OF SPHERES along the bat's length.
    // Cannon-ES cylinder-vs-sphere has tunneling issues, so sphere-vs-sphere.
    // Spheres laid out along LOCAL Y axis to match the visual cylinder.
    batBody = new CANNON.Body({
      mass: 0,
      type: CANNON.Body.KINEMATIC,
      material: batMat,
    });
    const sphereCount = 10;
    const halfLen = CONFIG.bat.hitbox.length / 2;
    for (let i = 0; i < sphereCount; i++) {
      const t = i / (sphereCount - 1);                   // 0..1
      const y = -halfLen + t * CONFIG.bat.hitbox.length; // along Y
      batBody.addShape(
        new CANNON.Sphere(CONFIG.bat.hitbox.radius),
        new CANNON.Vec3(0, y, 0)
      );

      // 🟣 Magenta wireframe sphere showing each physics sphere location
      const dot = new THREE.Mesh(
        new THREE.SphereGeometry(CONFIG.bat.hitbox.radius * 1.1, 10, 10),
        new THREE.MeshBasicMaterial({ color: 0xff00ff, wireframe: true })
      );
      dot.position.set(0, y, 0);
      hitboxViz.add(dot);
      debugObjects.push(dot);
    }
    batBody.position.copy(batMesh.position);
    world.addBody(batBody);
    console.log(`🏏 Bat hitbox: ${sphereCount}-sphere chain along the bat`);

    console.log(`🏏 Bat spawned at world (${spawnPos.x.toFixed(1)}, ${spawnPos.y.toFixed(1)}, ${spawnPos.z.toFixed(1)})`);
    console.log(`   👉 Put your controller near it and press GRIP (squeeze) to pick up!`);
  }

  // ---------- Pickup/Drop with grip button (squeezestart) ----------
  function tryPickup(grip) {
    if (!batMesh) return;
    if (batHolder) return; // already held

    // Distance check — controller must be within pickup range of the bat
    const gripPos = new THREE.Vector3();
    const batPos  = new THREE.Vector3();
    grip.getWorldPosition(gripPos);
    batMesh.getWorldPosition(batPos);
    const dist = gripPos.distanceTo(batPos);

    console.log(`🤏 Pickup attempt. Distance to bat: ${dist.toFixed(2)}m (threshold: ${CONFIG.bat.pickupRange}m)`);

    if (dist <= CONFIG.bat.pickupRange) {
      // Attach the bat to the grip
      scene.remove(batMesh);
      grip.add(batMesh);
      batMesh.position.set(CONFIG.bat.offset.position.x, CONFIG.bat.offset.position.y, CONFIG.bat.offset.position.z);
      batMesh.rotation.set(CONFIG.bat.offset.rotation.x, CONFIG.bat.offset.rotation.y, CONFIG.bat.offset.rotation.z);

      // Make it BRIGHT RED so it's impossible to miss while held.
      // But SKIP the debug visualizations — otherwise the blue cylinder and
      // magenta physics markers also get painted red and we lose them.
      if (CONFIG.bat.forceRedWhenHeld) {
        batMesh.traverse(obj => {
          if (!obj.isMesh) return;
          if (obj === batMesh.getObjectByName('batHitboxViz')) return;
          // Skip children of the hitbox viz too (the magenta dots)
          let p = obj.parent;
          while (p && p !== batMesh) {
            if (p.name === 'batHitboxViz') return;
            p = p.parent;
          }
          obj.material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        });
      }

      batHolder = grip;

      // Log actual bounding box of held bat so we can verify its size
      const box = new THREE.Box3().setFromObject(batMesh);
      const size = box.getSize(new THREE.Vector3());
      const wp = new THREE.Vector3();
      batMesh.getWorldPosition(wp);
      console.log(`✅ Bat picked up!`);
      console.log(`   Held bat size: ${size.x.toFixed(2)} × ${size.y.toFixed(2)} × ${size.z.toFixed(2)} meters`);
      console.log(`   Held bat world pos: (${wp.x.toFixed(2)}, ${wp.y.toFixed(2)}, ${wp.z.toFixed(2)})`);
    } else {
      console.log(`❌ Too far. Move your hand closer to the bat.`);
    }
  }

  function dropBat() {
    if (!batMesh || !batHolder) return;
    // Detach bat and leave it at its current world position
    const worldPos = new THREE.Vector3();
    const worldQ   = new THREE.Quaternion();
    batMesh.getWorldPosition(worldPos);
    batMesh.getWorldQuaternion(worldQ);
    batHolder.remove(batMesh);
    scene.add(batMesh);
    batMesh.position.copy(worldPos);
    batMesh.quaternion.copy(worldQ);
    batHolder = null;
    console.log('🫳 Bat dropped');
  }

  // Both controllers can pick up with grip (squeeze) or trigger fallback
  ctrl0.addEventListener('squeezestart', () => tryPickup(grip0));
  ctrl1.addEventListener('squeezestart', () => tryPickup(grip1));
  // Pressing squeeze again while holding drops the bat
  ctrl0.addEventListener('squeezeend', () => { /* keep holding for now */ });
  ctrl1.addEventListener('squeezeend', () => { /* keep holding for now */ });

  // Also support keyboard pickup for desktop testing
  window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (k === 'g') {
      // Pick up with whichever controller is closer
      if (batHolder) { dropBat(); return; }
      const g0p = new THREE.Vector3(); grip0.getWorldPosition(g0p);
      const g1p = new THREE.Vector3(); grip1.getWorldPosition(g1p);
      const bp  = new THREE.Vector3(); batMesh && batMesh.getWorldPosition(bp);
      if (!batMesh) return;
      const d0 = g0p.distanceTo(bp);
      const d1 = g1p.distanceTo(bp);
      tryPickup(d0 < d1 ? grip0 : grip1);
    }
  });


  // ---------- Debug Markers ----------
  // ---------- Debug Markers ----------
  function addMarkers() {
    const spawn = new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0xff3333, transparent: true, opacity: 0.6 })
    );
    spawn.position.set(CONFIG.pitch.spawnOffset.x, CONFIG.pitch.spawnOffset.y, CONFIG.pitch.spawnOffset.z);
    playerRig.add(spawn);
    debugObjects.push(spawn);

    const target = new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0x33ff33, transparent: true, opacity: 0.5 })
    );
    target.position.set(CONFIG.pitch.targetOffset.x, CONFIG.pitch.targetOffset.y, CONFIG.pitch.targetOffset.z);
    playerRig.add(target);
    debugObjects.push(target);
    console.log('✓ Debug markers added (red = spawn, green = target)');
  }


  // ---------- Pitch Spawner ----------
  const activeBalls = [];
  let lastPitchTime = 0;

  function spawnPitch() {
    if (!ballTemplate) { console.warn('Ball model not loaded yet'); return; }
    const now = performance.now();
    if (now - lastPitchTime < CONFIG.pitch.cooldownMs) return;
    lastPitchTime = now;

    // Convert RELATIVE offsets to WORLD positions (accounts for player rotation)
    const spawnWorld  = playerRig.localToWorld(new THREE.Vector3(
      CONFIG.pitch.spawnOffset.x, CONFIG.pitch.spawnOffset.y, CONFIG.pitch.spawnOffset.z
    ));
    const targetWorld = playerRig.localToWorld(new THREE.Vector3(
      CONFIG.pitch.targetOffset.x + (Math.random() - 0.5) * CONFIG.pitch.randomSpread,
      CONFIG.pitch.targetOffset.y,
      CONFIG.pitch.targetOffset.z
    ));

    const mesh = ballTemplate.clone(true);
    mesh.scale.setScalar(CONFIG.ball.scale);
    mesh.position.copy(spawnWorld);
    scene.add(mesh);

    // 🔴 Red wireframe sphere showing the ball's physics hitbox
    const ballHitboxViz = new THREE.Mesh(
      new THREE.SphereGeometry(CONFIG.ball.radius, 12, 12),
      new THREE.MeshBasicMaterial({
        color: 0xff2222,
        wireframe: true,
        transparent: true,
        opacity: 0.8,
      })
    );
    mesh.add(ballHitboxViz);
    debugObjects.push(ballHitboxViz);

    const body = new CANNON.Body({
      mass: CONFIG.ball.mass, material: ballMat,
      shape: new CANNON.Sphere(CONFIG.ball.radius),
      linearDamping: 0.01, angularDamping: 0.01,
    });
    body.position.copy(mesh.position);

    // 🎯 Continuous Collision Detection
    body.ccdSpeedThreshold = 1;
    body.ccdIterations = 5;

    const dir = targetWorld.clone().sub(spawnWorld);
    const dx = dir.x, dz = dir.z;
    const horizontalDist = Math.sqrt(dx*dx + dz*dz);
    const flightTime = horizontalDist / CONFIG.pitch.speed;

    // 📐 Ballistic aiming: compute the vertical velocity needed so the ball
    // arrives at target height AFTER gravity acts on it for the flight time.
    //     y_target = y_spawn + vy * t + 0.5 * g * t²
    // →   vy = (y_target - y_spawn - 0.5 * g * t²) / t
    const g  = CONFIG.physics.gravity;  // negative number
    const vy = (targetWorld.y - spawnWorld.y - 0.5 * g * flightTime * flightTime) / flightTime;

    // Horizontal velocity — normalized XZ direction scaled by pitch speed
    const horizNorm = horizontalDist > 1e-6 ? 1 / horizontalDist : 0;
    body.velocity.set(
      dx * horizNorm * CONFIG.pitch.speed,
      vy,
      dz * horizNorm * CONFIG.pitch.speed
    );

    body.addEventListener('collide', (e) => {
      // Log EVERY collision so we can see exactly what the ball hits
      const what =
        e.body === batBody    ? 'BAT' :
        e.body === groundBody ? 'GROUND' :
                                `other(id=${e.body.id})`;
      console.log(`💥 Ball collided with ${what} | batVel=${batVelocity.length().toFixed(2)}m/s`);

      if (e.body === batBody) {
        stats.hitCount++;
        stats.lastHitSpeed = batVelocity.length();
        const impulseDir = batVelocity.clone().normalize();
        const strength = Math.max(batVelocity.length(), 1.0) * CONFIG.physics.hitBoost * CONFIG.ball.mass;
        body.applyImpulse(
          new CANNON.Vec3(
            impulseDir.x * strength,
            Math.abs(impulseDir.y * strength) + strength * 0.3,
            impulseDir.z * strength
          ),
          new CANNON.Vec3(0, 0, 0)
        );
      }
    });

    world.addBody(body);
    activeBalls.push({ mesh, body, spawnTime: now });
    stats.pitchCount++;
    console.log(`⚾ Pitch #${stats.pitchCount} from`, spawnWorld.toArray().map(n => n.toFixed(1)));
  }

  ctrl0.addEventListener('selectstart', spawnPitch);
  ctrl1.addEventListener('selectstart', spawnPitch);

  if (CONFIG.debug.keyboardPitch) {
    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'p') spawnPitch();
    });
  }

  // 🐞 Debug toggle — button click OR D key
  document.getElementById('debugBtn').addEventListener('click', () => setDebugVisible(!debugVisible));
  window.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'd') setDebugVisible(!debugVisible);
  });


  // ---------- HUD ----------
  const stats = { pitchCount: 0, hitCount: 0, lastHitSpeed: 0 };
  let hud = null;

  function makeHUD() {
    if (!CONFIG.hud.enabled) return;
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 256;
    const ctx = canvas.getContext('2d');
    const texture = new THREE.CanvasTexture(canvas);
    const mesh = new THREE.Mesh(
      new THREE.PlaneGeometry(CONFIG.hud.size.w, CONFIG.hud.size.h),
      new THREE.MeshBasicMaterial({ map: texture, transparent: true })
    );
    mesh.position.set(CONFIG.hud.position.x, CONFIG.hud.position.y, CONFIG.hud.position.z);
    playerRig.add(mesh);
    hud = { mesh, canvas, ctx, texture };
  }

  function updateHUD() {
    if (!hud) return;
    const { canvas, ctx, texture } = hud;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'white';
    ctx.font = 'bold 40px sans-serif';
    ctx.fillText('⚾ Baseball VR', 20, 50);
    ctx.font = '28px sans-serif';
    ctx.fillText(`Pitches: ${stats.pitchCount}`, 20, 110);
    ctx.fillText(`Hits:    ${stats.hitCount}`,   20, 150);
    ctx.fillText(`Last Bat Speed: ${stats.lastHitSpeed.toFixed(1)} m/s`, 20, 200);
    texture.needsUpdate = true;
  }


  // ---------- Main Loop ----------
  const clock = new THREE.Clock();
  const tmpV  = new THREE.Vector3();
  const tmpQ  = new THREE.Quaternion();

  // 🟡 YELLOW sphere showing where the batBody physics body actually is in world space.
  // This is attached to the SCENE (not the bat), so if it doesn't overlap
  // the blue cylinder, the physics body isn't syncing to the mesh.
  const batBodyProbe = new THREE.Mesh(
    new THREE.SphereGeometry(0.05, 12, 12),
    new THREE.MeshBasicMaterial({ color: 0xffff00, wireframe: true })
  );
  scene.add(batBodyProbe);
  debugObjects.push(batBodyProbe);

  function syncBatBody(dt) {
    if (!batMesh || !batBody) return;
    const target = batMesh.getObjectByName('batHitboxViz') || batMesh;
    target.getWorldPosition(tmpV);
    target.getWorldQuaternion(tmpQ);
    batVelocity.copy(tmpV).sub(batPrevPos).divideScalar(Math.max(dt, 1e-4));
    batPrevPos.copy(tmpV);
    batBody.position.copy(tmpV);
    batBody.quaternion.copy(tmpQ);
    batBody.velocity.set(batVelocity.x, batVelocity.y, batVelocity.z);

    // Show the body's actual position with a yellow marker
    batBodyProbe.position.copy(batBody.position);
  }

  function syncBalls() {
    for (const b of activeBalls) {
      b.mesh.position.copy(b.body.position);
      b.mesh.quaternion.copy(b.body.quaternion);

      // 🔍 PROXIMITY LOG: if the ball gets within 0.5m of the bat body,
      // log it so we know the physics bodies are near each other.
      if (batBody && !b.proxLogged) {
        const dx = b.body.position.x - batBody.position.x;
        const dy = b.body.position.y - batBody.position.y;
        const dz = b.body.position.z - batBody.position.z;
        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
        if (dist < 0.5) {
          console.log(`🔍 Ball near bat! Distance: ${dist.toFixed(2)}m`);
          b.proxLogged = true;
        }
      }
    }
    const now = performance.now();
    for (let i = activeBalls.length - 1; i >= 0; i--) {
      const b = activeBalls[i];
      if (b.body.position.y < CONFIG.player.position.y - 2 || now - b.spawnTime > 15000) {
        scene.remove(b.mesh);
        world.removeBody(b.body);
        activeBalls.splice(i, 1);
      }
    }
  }

  // Per-second debug log of where everything actually is
  let logTimer = 0;
  function debugLog(dt) {
    logTimer += dt;
    if (logTimer < 1.0) return;
    logTimer = 0;
    if (!batMesh) return;
    const bp = new THREE.Vector3();
    const g0 = new THREE.Vector3();
    const g1 = new THREE.Vector3();
    const cp = new THREE.Vector3();
    batMesh.getWorldPosition(bp);
    grip0.getWorldPosition(g0);
    grip1.getWorldPosition(g1);
    camera.getWorldPosition(cp);
    console.log(
      `📍 cam:(${cp.x.toFixed(1)},${cp.y.toFixed(1)},${cp.z.toFixed(1)}) | ` +
      `grip0:(${g0.x.toFixed(1)},${g0.y.toFixed(1)},${g0.z.toFixed(1)}) | ` +
      `grip1:(${g1.x.toFixed(1)},${g1.y.toFixed(1)},${g1.z.toFixed(1)}) | ` +
      `bat:(${bp.x.toFixed(1)},${bp.y.toFixed(1)},${bp.z.toFixed(1)})`
    );
  }

  renderer.setAnimationLoop(() => {
    const dt = clock.getDelta();
    syncBatBody(dt);
    world.step(1/120, dt, 10); // finer timestep, more substeps = no tunneling
    syncBalls();
    updateHUD();
    debugLog(dt);
    if (coordsEl) {
      const p = camera.position;
      coordsEl.textContent = `cam: (${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)})`;
    }
    renderer.render(scene, camera);
  });

  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });


  // ---------- Boot ----------
  loadAll().then(() => {
    spawnBatInWorld();
    makeHUD();
    addMarkers();
    // Apply initial debug state (from CONFIG.debug.showBatCollider / showMarkers)
    const startOn = CONFIG.debug.showBatCollider || CONFIG.debug.showMarkers;
    setDebugVisible(startOn);
    console.log('✅ Ready. GRAB THE BAT: move controller near green pedestal, press GRIP (squeeze).');
    console.log('   Desktop: G = grab/drop · P = pitch · D = toggle debug.');
  }).catch(err => {
    console.error(err);
    document.body.insertAdjacentHTML('beforeend',
      `<div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
         background:#b00;color:white;padding:20px;font-family:sans-serif;border-radius:8px;
         max-width:400px;text-align:center;">
         <b>Failed to load assets.</b><br/><br/>
         Make sure <code>stadium.glb</code>, <code>bat.glb</code>, and <code>baseball.glb</code>
         are inside an <code>assets/</code> folder next to <code>index.html</code>.<br/><br/>
         <small>${err.message}</small>
       </div>`);
  });
  </script>
</body>
</html>
